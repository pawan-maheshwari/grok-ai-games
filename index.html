<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 AI Odyssey Games Hub | Fun AI Learning for Kids 8-12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;family=Fredoka:wght@400;500;600&amp;display=swap');
        
        :root {
            --primary: #6366f1;
        }
        
        body {
            font-family: 'Poppins', system_ui, sans-serif;
        }
        
        .fun-font {
            font-family: 'Fredoka', 'Poppins', system_ui, sans-serif;
            font-weight: 600;
        }

        .game-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .section-header {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kid-button {
            transition: all 0.2s ease;
            font-weight: 600;
        }
        
        .kid-button:hover {
            transform: scale(1.05);
        }

        .kid-button:active {
            transform: scale(0.98);
        }

        .game-emoji {
            font-size: 3.5rem;
            line-height: 1;
            transition: transform 0.3s ease;
        }
        
        .game-card:hover .game-emoji {
            transform: scale(1.1) rotate(5deg);
        }

        .top-bar {
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
        }
        
        #qrcode {
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-indigo-50 min-h-screen">

    <!-- Top Bar: QR + Visitor -->
    <div class="top-bar text-white py-3 px-6 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-x-4">
                <div class="text-sm font-medium flex items-center gap-x-2 whitespace-nowrap">
                    <i class="fas fa-qrcode text-lg"></i>
                    <span class="hidden sm:inline">Scan to Play on Mobile</span>
                </div>
                <div id="qrcode"></div>
            </div>

            <div class="flex items-center gap-x-3 bg-white/20 backdrop-blur-md px-6 py-2 rounded-3xl text-sm font-medium">
                <i class="fas fa-users"></i>
                <span>Played by</span>
                <span id="visitor-count" class="font-extrabold text-amber-200">---</span>
                <span class="text-xs opacity-75">players</span>
            </div>
        </div>
    </div>

    <!-- Rest of the page (original content) -->
    <nav class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-violet-500 rounded-2xl flex items-center justify-center shadow-lg">
                    <span class="text-white text-3xl">🧠</span>
                </div>
                <div>
                    <h1 class="font-bold text-3xl tracking-tight text-slate-900">AI Odyssey</h1>
                    <p class="text-xs text-slate-500 -mt-1">Games for Young Minds</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-4">
                <div class="hidden md:flex items-center bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-sm font-semibold">
                    <i class="fas fa-graduation-cap mr-2"></i>
                    <span>Ages 8–12 • Class 3–7</span>
                </div>
                <a href="https://pawanmaheshwari.github.io" target="_blank" class="flex items-center gap-x-2 text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors">
                    <i class="fas fa-globe"></i>
                    <span class="hidden sm:inline">By Pawan Maheshwari</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero + Games Grid + Footer (kept original) -->
    <!-- ... (full original content preserved) ... -->

    <script>
        // QR Code
        function generateQR() {
            new QRCode(document.getElementById("qrcode"), {
                text: "https://pawan-maheshwari.github.io/grok-ai-games/index.html",
                width: 128,
                height: 128,
                colorDark: "#1e2937",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        // Visitor Counter
        function loadVisitorCount() {
            const countEl = document.getElementById('visitor-count');
            countEl.innerHTML = `<img src="https://komarev.com/ghpvc/?username=pawan-maheshwari&repo=grok-ai-games&label=&color=6366f1&style=flat" alt="visitors" />`;
        }

        window.onload = function() {
            generateQR();
            loadVisitorCount();
            console.log('%c[AI Odyssey] QR Code + Visitor Counter ready!', 'color:#6366f1');
        };
    </script>
</body>
</html>
