<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 ML Pet Trainer • AI Odyssey Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Poppins', system_ui, sans-serif; }
        .ml-bg { background: linear-gradient(180deg, #052e16 0%, #14532d 100%); }
        .card { transition: all 0.2s ease; }
    </style>
</head>
<body class="ml-bg text-emerald-100 min-h-screen">
    <div class="max-w-5xl mx-auto px-5 py-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-5">
            <div class="flex items-center gap-x-3">
                <a href="index.html" class="flex items-center text-emerald-300 hover:text-white text-sm font-medium">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Hub
                </a>
                <div class="px-3.5 py-1 bg-white/10 text-xs font-bold tracking-[1px] rounded-2xl">GAME 4 / 5</div>
            </div>
            <div class="flex items-center gap-x-3">
                <div class="bg-white/10 px-5 py-2 rounded-2xl flex items-center text-sm">
                    <span class="font-extrabold text-2xl text-emerald-400" id="total-score">0</span>
                    <span class="text-white/50 ml-1.5">/ 250</span>
                </div>
                <div class="bg-white/10 px-4 py-2 rounded-2xl text-sm font-bold flex items-center gap-x-2">
                    <i class="fas fa-robot"></i>
                    <span>ACCURACY: <span id="accuracy">0</span>%</span>
                </div>
            </div>
        </div>

        <div class="text-center mb-6">
            <h1 class="text-5xl font-extrabold tracking-tighter">ML Pet Trainer</h1>
            <p class="text-emerald-300 mt-1">Train your AI pet to tell yummy snacks from fun toys!</p>
        </div>

        <!-- Training -->
        <div class="bg-white/95 text-emerald-950 rounded-3xl p-6 mb-8 shadow-2xl">
            <div class="flex justify-between mb-4">
                <h2 class="text-2xl font-bold">Training Examples</h2>
                <div id="count" class="text-emerald-600 font-medium">0 / 8 labeled</div>
            </div>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            <button onclick="trainPet()" id="trainBtn" class="mt-8 w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl text-xl font-bold disabled:opacity-50" disabled>TRAIN MY PET!</button>
        </div>

        <!-- Test Your Pet -->
        <div class="bg-white/95 text-emerald-950 rounded-3xl p-6 shadow-2xl">
            <h2 class="text-2xl font-bold mb-4">Test Your Pet (Teach corrections!)</h2>
            <div id="testGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
            <button onclick="retrain()" class="mt-6 w-full bg-violet-600 hover:bg-violet-700 py-3 rounded-2xl text-white">RETRAIN WITH CORRECTIONS</button>
        </div>
    </div>

    <script>
        let trainingData = [
            {name: "🍎 Apple", type: "snack", label: null},
            {name: "🍫 Chocolate", type: "snack", label: null},
            {name: "🥕 Carrot", type: "snack", label: null},
            {name: "🧸 Teddy Bear", type: "toy", label: null},
            {name: "🚗 Toy Car", type: "toy", label: null},
            {name: "🍌 Banana", type: "snack", label: null},
            {name: "🎈 Balloon", type: "toy", label: null},
            {name: "🥜 Peanuts", type: "snack", label: null}
        ];

        let testData = [
            {name: "🍪 Cookie", type: "snack"},
            {name: "🪀 Yo-yo", type: "toy"},
            {name: "🥭 Mango", type: "snack"},
            {name: "🦖 Dino Toy", type: "toy"},
            {name: "🥛 Milk", type: "snack"}
        ];

        let totalScore = 0;
        let accuracy = 0;

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            trainingData.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = `card bg-white/10 p-6 rounded-3xl text-center cursor-pointer ${item.label ? 'ring-2 ring-emerald-400' : 'hover:bg-white/20'}`;
                div.innerHTML = `
                    <div class="text-6xl mb-3">${item.name.split(' ')[0]}</div>
                    <div class="font-bold">${item.name}</div>
                    ${item.label ? `<div class="text-xs mt-2 ${item.label === 'snack' ? 'text-emerald-400' : 'text-orange-400'}">${item.label.toUpperCase()}</div>` : ''}
                `;
                div.onclick = () => labelItem(i);
                grid.appendChild(div);
            });
            document.getElementById('count').textContent = `${trainingData.filter(i => i.label).length}/8 labeled`;
            document.getElementById('trainBtn').disabled = trainingData.filter(i => i.label).length < 4;
        }

        function labelItem(i) {
            const item = trainingData[i];
            const choice = confirm(`Is "${item.name}" a YUMMY SNACK or FUN TOY?\nOK = SNACK, Cancel = TOY`);
            item.label = choice ? 'snack' : 'toy';
            renderGrid();
        }

        function trainPet() {
            accuracy = 60;
            totalScore += 80;
            document.getElementById('total-score').innerText = totalScore;
            document.getElementById('accuracy').innerText = accuracy;
            renderTestGrid();
            alert("Pet trained! Now test and correct below to improve accuracy.");
        }

        function renderTestGrid() {
            const grid = document.getElementById('testGrid');
            grid.innerHTML = '';
            testData.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'bg-white/10 p-4 rounded-3xl text-center';
                div.innerHTML = `
                    <div class="text-4xl mb-2">${item.name.split(' ')[0]}</div>
                    <div class="text-sm">${item.name}</div>
                    <div class="mt-3 flex gap-2 justify-center">
                        <button onclick="correctTest(${i}, 'snack')" class="bg-emerald-600 px-4 py-1 rounded-xl text-xs text-white">SNACK</button>
                        <button onclick="correctTest(${i}, 'toy')" class="bg-orange-600 px-4 py-1 rounded-xl text-xs text-white">TOY</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function correctTest(i, choice) {
            testData[i].type = choice;
            accuracy = Math.min(100, accuracy + 15);
            totalScore = Math.min(250, totalScore + 20);
            document.getElementById('total-score').innerText = totalScore;
            document.getElementById('accuracy').innerText = accuracy;
            renderTestGrid();
            alert("Great teaching! Pet learned and accuracy improved.");
        }

        function retrain() {
            alert("Retrain complete! Your pet is smarter now.");
        }

        renderGrid();
    </script>
</body>
</html>
