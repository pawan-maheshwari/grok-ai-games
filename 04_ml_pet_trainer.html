<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Pet Trainer • AI Odyssey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: linear-gradient(#052e16, #14532d); color: white; min-height: 100vh; padding: 1rem; }
        .card { background: rgba(255,255,255,0.1); padding: 1rem; border-radius: 1rem; text-align: center; cursor: pointer; transition: all 0.2s; }
        .card:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        button { background: #10b981; padding: 1rem; border-radius: 1rem; font-weight: bold; width: 100%; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-center mb-8">ML Pet Trainer</h1>
        
        <div class="mb-8">
            <h2 class="text-2xl mb-4">1. Training Examples</h2>
            <div id="training" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            <button onclick="train()">TRAIN MY PET</button>
        </div>

        <div>
            <h2 class="text-2xl mb-4">2. Test Your Pet (Teach it!)</h2>
            <div id="test" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
        </div>
    </div>

    <script>
        const trainingItems = [
            {emoji: "🍎", name: "Apple", label: null},
            {emoji: "🍫", name: "Chocolate", label: null},
            {emoji: "🥕", name: "Carrot", label: null},
            {emoji: "🧸", name: "Teddy", label: null},
            {emoji: "🚗", name: "Car", label: null},
            {emoji: "🍌", name: "Banana", label: null},
            {emoji: "🎈", name: "Balloon", label: null},
            {emoji: "🥜", name: "Peanuts", label: null}
        ];

        const testItems = [
            {emoji: "🍪", name: "Cookie", correct: "snack"},
            {emoji: "🪀", name: "Yo-yo", correct: "toy"},
            {emoji: "🥭", name: "Mango", correct: "snack"},
            {emoji: "🦖", name: "Dino", correct: "toy"},
            {emoji: "🥛", name: "Milk", correct: "snack"}
        ];

        function renderTraining() {
            const container = document.getElementById('training');
            container.innerHTML = '';
            trainingItems.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<div class="text-6xl">${item.emoji}</div><div>${item.name}</div>`;
                if (item.label) div.innerHTML += `<div class="text-xs mt-1">${item.label}</div>`;
                div.onclick = () => {
                    item.label = prompt(`SNACK or TOY for ${item.name}?`) || item.label;
                    renderTraining();
                };
                container.appendChild(div);
            });
        }

        function train() {
            alert("Pet trained! Now test below.");
            renderTest();
        }

        function renderTest() {
            const container = document.getElementById('test');
            container.innerHTML = '';
            testItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="text-5xl">${item.emoji}</div>
                    <div>${item.name}</div>
                    <button onclick="teach(this, '${item.correct}')" class="mt-2 bg-blue-600 text-white px-4 py-1 rounded">Teach SNACK</button>
                    <button onclick="teach(this, 'toy')" class="mt-2 bg-orange-600 text-white px-4 py-1 rounded">Teach TOY</button>
                `;
                container.appendChild(div);
            });
        }

        function teach(btn, type) {
            btn.parentElement.style.background = '#10b981';
            btn.parentElement.innerHTML += `<div class="text-xs text-green-400 mt-2">Learned as ${type}!</div>`;
            alert("Pet learned from your teaching! Accuracy improved.");
        }

        renderTraining();
    </script>
</body>
</html>
