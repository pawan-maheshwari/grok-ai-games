<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Pet Trainer • AI Odyssey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Poppins', system_ui, sans-serif; }
        .ml-bg { background: linear-gradient(180deg, #052e16 0%, #14532d 100%); }
        .card { transition: all 0.2s ease; }
    </style>
</head>
<body class="ml-bg text-emerald-100 min-h-screen p-4">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-5xl font-bold text-center my-8">ML Pet Trainer</h1>
        
        <!-- Training -->
        <div class="bg-white/10 rounded-3xl p-6 mb-8">
            <div class="flex justify-between mb-4">
                <h2 class="text-2xl">Training Examples</h2>
                <div id="count" class="text-emerald-400">0/8 labeled</div>
            </div>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            <button onclick="trainPet()" id="trainBtn" class="mt-8 w-full bg-emerald-600 py-4 rounded-2xl text-xl font-bold disabled:opacity-50" disabled>TRAIN MY PET!</button>
        </div>

        <!-- Test Your Pet -->
        <div class="bg-white/10 rounded-3xl p-6">
            <h2 class="text-2xl mb-4">Test Your Pet (Teach corrections!)</h2>
            <div id="testGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
            <button onclick="retrain()" class="mt-6 w-full bg-violet-600 py-3 rounded-2xl">RETRAIN WITH CORRECTIONS</button>
        </div>
    </div>

    <script>
        let trainingData = [
            {name: "🍎 Apple", type: "snack", label: null},
            {name: "🍫 Chocolate", type: "snack", label: null},
            {name: "🥕 Carrot", type: "snack", label: null},
            {name: "🧸 Teddy Bear", type: "toy", label: null},
            {name: "🚗 Toy Car", type: "toy", label: null},
            {name: "🍌 Banana", type: "snack", label: null},
            {name: "🎈 Balloon", type: "toy", label: null},
            {name: "🥜 Peanuts", type: "snack", label: null}
        ];

        let testData = [
            {name: "🍪 Cookie", type: "snack"},
            {name: "🪀 Yo-yo", type: "toy"},
            {name: "🥭 Mango", type: "snack"},
            {name: "🦖 Dino Toy", type: "toy"},
            {name: "🥛 Milk", type: "snack"}
        ];

        let accuracy = 0;

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            trainingData.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = `card bg-white/10 p-6 rounded-3xl text-center cursor-pointer ${item.label ? 'ring-2 ring-emerald-400' : 'hover:bg-white/20'}`;
                div.innerHTML = `
                    <div class="text-6xl mb-3">${item.name.split(' ')[0]}</div>
                    <div class="font-bold">${item.name}</div>
                    ${item.label ? `<div class="text-xs mt-2 ${item.label === 'snack' ? 'text-emerald-400' : 'text-orange-400'}">${item.label.toUpperCase()}</div>` : ''}
                `;
                div.onclick = () => labelItem(i);
                grid.appendChild(div);
            });
            document.getElementById('count').textContent = `${trainingData.filter(i => i.label).length}/8 labeled`;
            document.getElementById('trainBtn').disabled = trainingData.filter(i => i.label).length < 4;
        }

        function labelItem(i) {
            const item = trainingData[i];
            const choice = confirm(`Is "${item.name}" a YUMMY SNACK or FUN TOY?\nOK = SNACK, Cancel = TOY`);
            item.label = choice ? 'snack' : 'toy';
            renderGrid();
        }

        function trainPet() {
            accuracy = 60;
            renderTestGrid();
            alert("Pet trained! Now test and correct below.");
        }

        function renderTestGrid() {
            const grid = document.getElementById('testGrid');
            grid.innerHTML = '';
            testData.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'bg-white/10 p-4 rounded-3xl text-center';
                div.innerHTML = `
                    <div class="text-4xl mb-2">${item.name.split(' ')[0]}</div>
                    <div class="text-sm">${item.name}</div>
                    <div class="mt-3 flex gap-2 justify-center">
                        <button onclick="correctTest(${i}, 'snack')" class="bg-emerald-600 px-4 py-1 rounded-xl text-xs">SNACK</button>
                        <button onclick="correctTest(${i}, 'toy')" class="bg-orange-600 px-4 py-1 rounded-xl text-xs">TOY</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function correctTest(i, choice) {
            testData[i].type = choice;
            accuracy = Math.min(100, accuracy + 20);
            renderTestGrid();
            alert("Pet learned! Accuracy improved.");
        }

        function retrain() {
            alert("Retrain complete! Great job teaching your pet.");
        }

        renderGrid();
    </script>
</body>
</html>
