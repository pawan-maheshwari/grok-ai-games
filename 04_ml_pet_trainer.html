<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Pet Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui; background: linear-gradient(#052e16, #14532d); color: white; }
        .card { transition: all 0.2s; }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-center mb-8">ML Pet Trainer</h1>
        <div class="bg-white/10 rounded-3xl p-6">
            <h2 class="text-2xl mb-4">Training Examples</h2>
            <div id="grid" class="grid grid-cols-4 gap-4"></div>
            <button onclick="train()" class="mt-6 bg-green-600 px-8 py-3 rounded-xl text-lg">TRAIN MY PET</button>
        </div>
    </div>

    <script>
        const items = [
            {name: "🍎 Apple", type: "snack"},
            {name: "🍫 Chocolate", type: "snack"},
            {name: "🥕 Carrot", type: "snack"},
            {name: "🧸 Teddy", type: "toy"},
            {name: "🚗 Car", type: "toy"},
            {name: "🍌 Banana", type: "snack"},
            {name: "🎈 Balloon", type: "toy"},
            {name: "🥜 Peanuts", type: "snack"}
        ];

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            items.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'card bg-white/10 p-4 rounded-2xl text-center cursor-pointer hover:bg-white/20';
                div.innerHTML = `<div class="text-5xl">${item.name.split(' ')[0]}</div><div class="text-sm mt-2">${item.name}</div>`;
                div.onclick = () => alert(`Choose for ${item.name}: SNACK or TOY (demo)`);
                grid.appendChild(div);
            });
        }

        function train() {
            alert("Pet trained! (Full version with corrections coming)");
        }

        render();
    </script>
</body>
</html>
